<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div id="map"></div>
<div id="panel">
    <p><b>Select</b> a Campus:</p>
    <select id="campus-select" onchange="switchCampus(this.value)">
        <option disabled selected>Loading campuses…</option>
    </select>
    <p><b>Click map or search</b> to set start, then end</p>
    <input type="text" id="search" placeholder="Search building…" oninput="searchBuildings(this.value)"/>
    <div id="suggestions"></div>
    <p id="start-label">Start: —</p>
    <p id="end-label">End: —</p>
    <button onclick="findPath()">Find shortest path</button>
    <button onclick="swapStartAndEnd()">Swap Start ↔ End</button>
    <button onclick="clearPath()">Clear</button>
    <div id="result"></div>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
